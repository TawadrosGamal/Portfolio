name: Deploy Portfolio to Pages

on:
  push:
    branches: ["main"] # Or "master" depending on your default branch name

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs in progress for efficiency
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Upgraded past the Node 20 deprecation notice

      - name: Install Dependencies
        run: npm install # Standard install that works even if package-lock.json is missing

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite builds into the 'dist' folder by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4